<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Panduan praktis dan terstruktur untuk menguasai ekosistem React yang dipakai di dunia kerja nyata. React Router, TanStack Query, Axios, React Hook Form, Zod, Redux Toolkit, Zustand, dan Testing." />
    <title>React Ecosystem - Panduan Library Modern untuk Junior Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var div = document.createElement('div');
        div.style.color = 'red';
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.backgroundColor = 'white';
        div.style.padding = '10px';
        div.style.zIndex = '9999';
        div.innerText = 'Error: ' + msg + ' at ' + url + ':' + lineNo;
        document.body.appendChild(div);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
